name: Update README with list of i18n volunteers

on:
  schedule:
    # Every week
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  update-readme:
    if: github.repository == 'cheeaun/phanpy'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13
      - run: bun install --frozen-lockfile
      - run: |
          bun run fetch-i18n-volunteers
          bun run readme:i18n-volunteers

          # Commit & push if there are changes
          if git diff --quiet README.md; then
            echo "No changes to README.md"
          else
            echo "Changes to README.md"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git config --global user.name "github-actions[bot]"
            git add README.md
            git commit -m "Update README.md"
            git push
          fi
        env:
          CROWDIN_ACCESS_TOKEN: ${{ secrets.CROWDIN_ACCESS_TOKEN }}
