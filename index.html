<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>%PHANPY_CLIENT_NAME%</title>
    <meta
      name="description"
      content="Minimalistic opinionated Bluesky web client"
    />
    <meta name="color-scheme" content="light dark" />
    <style>
      :root {
        color-scheme: light dark;
      }

      #boot-status {
        padding: 24px;
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        color: CanvasText;
      }
    </style>
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="%PHANPY_CLIENT_NAME%" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta
      name=""
      data-theme-setting="manual"
      content="#242526"
      data-theme-light-color="#fff"
      data-theme-light-color-temp="#ffff"
      data-theme-dark-color="#242526"
      data-theme-dark-color-temp="#242526ff"
    />
    <meta
      name="theme-color"
      data-theme-setting="auto"
      content="#fff"
      data-content="#fff"
      data-content-temp="#fffa"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      data-theme-setting="auto"
      content="#242526"
      data-content="#242526"
      data-content-temp="#242526aa"
      media="(prefers-color-scheme: dark)"
    />
    <meta name="google" content="notranslate" />
    <link rel="me" href="https://hachyderm.io/@phanpy" />
    <script
      defer
      data-domain="bluepy.social"
      src="https://p.mosphere.at/js/script.js"
    ></script>
  </head>
  <body>
    <div id="app">
      <div id="boot-status">Loading Bluepy...</div>
    </div>
    <div id="modal-container"></div>
    <script>
      window.addEventListener('error', (event) => {
        const bootStatus = document.getElementById('boot-status');
        if (bootStatus) {
          bootStatus.textContent = `Bluepy failed to start: ${event.message || 'unknown error'}`;
        }
      });
      window.addEventListener('unhandledrejection', (event) => {
        const bootStatus = document.getElementById('boot-status');
        if (bootStatus) {
          bootStatus.textContent = `Bluepy failed to start: ${event.reason?.message || event.reason || 'unknown error'}`;
        }
      });
      window.setTimeout(() => {
        const bootStatus = document.getElementById('boot-status');
        if (bootStatus) {
          bootStatus.textContent =
            'Bluepy is still loading. If this stays here, Safari did not run the app script.';
        }
      }, 5000);
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
